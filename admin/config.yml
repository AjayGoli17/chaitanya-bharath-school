backend:
  name: git-gateway
  branch: main
media_folder: "public/uploads"
public_folder: "/public/uploads"
collections:
  - name: "announcements"
    label: "Announcements"
    folder: "content/announcements"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "exam_schedules"
    label: "Examination Schedules"
    folder: "content/exam-schedules"
    create: true
    fields:
      - { label: "Exam Title", name: "title", widget: "string" }
      - { label: "Class", name: "class", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Upload PDF", name: "pdf", widget: "file" }
  - name: "events"
    label: "Upcoming Events"
    folder: "content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
  - name: "home_page"
    label: "Home Page"
    files:
      - name: "home"
        label: "Leadership Section"
        file: "content/home.json"
        fields:
          - { label: "Principal Photo", name: "principal_photo", widget: "image" }
          - { label: "Principal Name", name: "principal_name", widget: "string" }
          - { label: "Principal Role", name: "principal_role", widget: "string", default: "Principal, CBS" }
  - name: "faculty_page"
    label: "Faculty Page"
    files:
      - name: "faculty"
        label: "Faculty Members"
        file: "content/faculty.json"
        fields:
          - label: "Leadership & Department Heads"
            name: "leadership"
            widget: "list"
            summary: "{{name}} — {{role}}"
            fields:
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role / Title", name: "role", widget: "string" }
              - { label: "Education", name: "education", widget: "string" }
          - label: "Teachers"
            name: "teachers"
            widget: "list"
            summary: "{{name}} — {{category}}"
            fields:
              - label: "Stage"
                name: "category"
                widget: "select"
                options: ["Foundation", "Preparatory", "Middle"]
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role / Title", name: "role", widget: "string" }
              - { label: "Education", name: "education", widget: "string" }
  - name: "gallery_page"
    label: "Gallery Page"
    files:
      - name: "gallery"
        label: "Gallery Content"
        file: "content/gallery.json"
        fields:
          - label: "Academics Photos"
            name: "academics"
            widget: "list"
            summary: "{{caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }
          - label: "Sports Photos"
            name: "sports"
            widget: "list"
            summary: "{{caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }
          - label: "Events Photos"
            name: "events"
            widget: "list"
            summary: "{{caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }
          - label: "Trips Photos"
            name: "trips"
            widget: "list"
            summary: "{{caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }
          - label: "Celebrations Photos"
            name: "celebrations"
            widget: "list"
            summary: "{{caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }
          - label: "Videos"
            name: "videos"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Video File", name: "video", widget: "file" }
              - { label: "Poster Image", name: "poster", widget: "image" }
              - { label: "Featured Video?", name: "featured", widget: "boolean", default: false, hint: "Only one video should be marked featured — it displays large at the top." }
